<VirtualHost *:80>
    ServerName localhost
    ServerAlias localhost

    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted

        # Symfony front controller
        FallbackResource /index.php
    </Directory>

    # Logs
    ErrorLog /var/log/apache2/miapp_error.log
    CustomLog /var/log/apache2/miapp_access.log combined
</VirtualHost>